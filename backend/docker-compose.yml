version: "3.8"

services:
  postgres:
    image: postgres:latest
    container_name: assetflow_postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_db:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assetflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: assetflow_api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-assetflow}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_db:
